# 不私密的超參數 — 可被 commit 進 git
# 私密設定 (DB_DSN, DISCORD_BOT_TOKEN, DISCORD_BOT_CHANNELID) 仍放在 .env
#
# 本檔為「牛熊 regime 感知逢低加碼」最終策略 (詳見 docs/optimization/BEST-STRATEGY.md)。
# 每個旋鈕都經 walk-forward 掃描驗證採納;證實無效的旋鈕已從程式碼移除。

# 追蹤的股票清單，每一檔都有各自獨立的冷卻期
track_stocks:
  - "006208"
  - "00830"

scaling_strategy: Baseline

# 加減碼金額乘數 (買賣金額統一放大倍數)
buy_and_sell_multiplier: 3

# 資料回補相關
max_back_months: 1
init_db_back_months: 60
back_testing_months: 60

# 起始現金
initial_cash: 100000

# ── 進場均線 & 牛熊判定 ──────────────────────────────────────────────
ma_window: 10              # 進場均線長度 (10 日)
regime_method: ma_pos     # 牛熊判定:收盤 > regime_ma_window 日均線 → 牛市
regime_ma_window: 200     # 200 日均線為牛熊分界 (掃描證實最佳;不加緩衝)

# ── 買進冷卻 (每檔同股最短間隔, =2 週) ──
cooldown_days: 14         # 空頭冷卻
bull_cooldown_days: 14    # 牛市冷卻

# ── 牛市:放寬進場 + 固定大額 (解決多頭抱現金) ──
bull_buy_band: 0.05       # 牛市:收盤 < 10MA×1.05 即可買 (熊市維持嚴格 <10MA)
bull_buy_amount: 2000     # 牛市每次固定買 2000 (×multiplier=3 → 實買 6000)

# ── 熊市:分級加碼 (幾何曲線,依「距一年高點回撤」越深買越多) ──
buy_depth_basis: peak     # 加碼深度基準:距近 252 日最高點的回撤 (比相對自己成本更客觀)
buy_base_amount: 500      # 幾何曲線基底
buy_tier_ratio: 2.0       # 各 tier = base×ratio^i → 500/1000/2000/4000/8000 (×multiplier)
baseline_buy_tiers:       # 只用 above 邊界 (金額由幾何曲線覆寫)
  - { above: -0.1 }
  - { above: -0.2 }
  - { above: -0.3 }
  - { above: -0.4 }

# ── 動態部位大小:買入金額隨總權益等比放大 (長線複利) ──
buy_size_mode: equity

# ── 賣出:獲利了結 (分批) + 熊市移動停利 ──
baseline_sell_threshold: 1.0   # 持倉最低成本獲利 ≥ 100% 觸發獲利了結
sell_frac_of_position: 0.33    # 獲利了結改賣「當前持股的 33%」(分批出場,取代固定金額)
trail_stop_bear: 0.08          # 熊市移動停利:從持有期間峰值回落 8% 全數出場
trail_min_gain: 0.20           # 移動停利僅在曾獲利 ≥ 20% 後才武裝 (不停損逢低買進)
