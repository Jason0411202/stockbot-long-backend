services:
  mariadb:
    image: mariadb:11.4
    container_name: stockbot-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-StockLongData}
      MARIADB_USER: ${MARIADB_USER:-exampleuser}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-examplepassword}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./deploy/mariadb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - stockbot

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stockbot-long-backend:local
    container_name: stockbot-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_DSN: ${MARIADB_USER:-exampleuser}:${MARIADB_PASSWORD:-examplepassword}@tcp(mariadb:3306)/?multiStatements=true
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_CHANNELID: ${DISCORD_BOT_CHANNELID:-}
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    expose:
      - "8080"
    networks:
      - stockbot

  caddy:
    image: caddy:2-alpine
    container_name: stockbot-caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      # 兩個變數都要保證非空字串,否則 Caddyfile 會因為 directive 沒參數而 parse error。
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - stockbot

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:

networks:
  stockbot:
    driver: bridge
