# docker-compose.yml 以 GHCR app image 在正式機部署 MariaDB + app + Caddy。
# Caddyfile、init.sql 以 inline configs 內嵌,config.yaml 已烤進 image;正式機只需本檔 + .env。
services:
  mariadb:
    image: mariadb:11.4
    container_name: stockbot-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-StockLongData}
      MARIADB_USER: ${MARIADB_USER:-exampleuser}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-examplepassword}
    volumes:
      - mariadb_data:/var/lib/mysql
    configs:
      - source: db_init
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - stockbot

  app:
    image: ${APP_IMAGE:-ghcr.io/jason0411202/stockbot-long-backend:latest}
    container_name: stockbot-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_DSN: ${MARIADB_USER:-exampleuser}:${MARIADB_PASSWORD:-examplepassword}@tcp(mariadb:3306)/?multiStatements=true
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_CHANNELID: ${DISCORD_BOT_CHANNELID:-}
    expose:
      - "8080"
    networks:
      - stockbot

  caddy:
    image: caddy:2-alpine
    container_name: stockbot-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - stockbot

configs:
  # Caddy 設定;SITE_ADDRESS=:80 為純 HTTP,設網域則自動 HTTPS (值由 compose 從 .env 代入)。
  caddyfile:
    content: |
      {
          email ${ACME_EMAIL:-admin@localhost}
      }

      ${SITE_ADDRESS:-:80} {
          reverse_proxy app:8080
          encode gzip
          log {
              output stdout
              format console
          }
      }
  # MariaDB 首次初始化時授權 app 帳號 (帳號隨 .env 的 MARIADB_USER 代換)。
  db_init:
    content: |
      GRANT ALL PRIVILEGES ON *.* TO '${MARIADB_USER:-exampleuser}'@'%';
      FLUSH PRIVILEGES;

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:

networks:
  stockbot:
    driver: bridge
